<!DOCTYPE html>
<html lang="sr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Позивница - Милош, Јована и Душан</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts with full Cyrillic support -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Instant Image Preloader to eliminate any load lagging -->
    <script>
        const preloadedImage = new Image();
        preloadedImage.src = "1000015399.jpg";
    </script>

    <style>
        .font-cursive-cyrillic { font-family: 'Marck Script', cursive; }
        .envelope-container { perspective: 1500px; will-change: transform; }
        
        .envelope-flap { 
            transform-origin: top center; 
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 30; 
            will-change: transform;
        }
        .envelope-flap.open { transform: rotateX(180deg); z-index: 10; }
        
        @keyframes pulseGold { 
            0%, 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.5); } 
            50% { box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); } 
        }
        .seal-pulse { animation: pulseGold 2.5s infinite; }
        
        @keyframes floatSlow { 
            0%, 100% { transform: translateY(0px); } 
            50% { transform: translateY(-8px); } 
        }
        .animate-float { animation: floatSlow 5s ease-in-out infinite; }
        
        img { -webkit-user-drag: none; user-select: none; }

        /* Highly Optimized "Carpet Roll" Unrolling Animation */
        .carpet-roll {
            transform: perspective(1200px) rotateX(-18deg) scale(0.85) translateY(-60px);
            transform-origin: top center;
            clip-path: inset(0 0 100% 0);
            opacity: 0;
            transition: clip-path 1.8s cubic-bezier(0.16, 1, 0.3, 1), 
                        transform 1.8s cubic-bezier(0.16, 1, 0.3, 1), 
                        opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: clip-path, transform, opacity;
        }
        
        .carpet-roll.unrolled {
            clip-path: inset(0 0 0% 0);
            transform: perspective(1200px) rotateX(0deg) scale(1) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="bg-[#a2b29f] h-full overflow-hidden select-none relative flex items-center justify-center font-sans">

    <!-- Gold Dust Ambient Canvas background -->
    <canvas id="gold-dust-canvas" class="absolute inset-0 z-10 opacity-60 pointer-events-none"></canvas>

    <!-- Background Music Toggle Floating Button -->
    <button id="music-toggle-btn" class="fixed bottom-6 right-6 z-50 bg-white/95 backdrop-blur-md p-3.5 rounded-full shadow-lg border border-yellow-600/20 text-yellow-600 hover:text-yellow-700 hover:scale-110 transition-all duration-300 hidden">
        <div class="relative w-5 h-5 flex items-center justify-center">
            <i id="music-icon" class="fas fa-music text-base"></i>
            <span id="music-wave" class="absolute -top-1 -right-1 flex h-2 w-2 hidden">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-500 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-yellow-500"></span>
            </span>
        </div>
    </button>

    <!-- ============================================ -->
    <!-- SECTION 1: SAGE ENVELOPE PRE-OPEN SCREEN     -->
    <!-- ============================================ -->
    <div id="envelope-screen" class="fixed inset-0 z-40 bg-[#a2b29f] flex flex-col items-center justify-center p-4 overflow-hidden">
        
        <div class="text-center mb-8 max-w-md px-4 animate-float">
            <p class="text-[10px] tracking-[0.3em] uppercase text-white/80 font-semibold mb-2">Позивница за посебан дан</p>
            <div class="h-[1px] w-16 bg-white/30 mx-auto my-3"></div>
            <p class="text-sm italic font-cursive-cyrillic text-white/90">Кликните на печат да отворите позивницу...</p>
        </div>

        <div class="envelope-container relative w-full max-w-[460px] h-[300px] bg-[#93a490] rounded-b-xl shadow-2xl transition-all duration-1000">
            <div class="absolute inset-0 bg-gradient-to-br from-[#a2b29f] to-[#889885] rounded-b-xl border-x border-b border-[#7c8c79]/30 overflow-hidden shadow-inner">
                <svg class="absolute inset-0 w-full h-full opacity-10" xmlns="http://www.w3.org/2000/svg">
                    <line x1="0" y1="0" x2="460" y2="300" stroke="#FAF8F5" stroke-width="1"/>
                    <line x1="460" y1="0" x2="0" y2="300" stroke="#FAF8F5" stroke-width="1"/>
                </svg>
            </div>

            <!-- TEASER PEEK WITH JPG IMAGE -->
            <div id="envelope-card-peek" class="absolute top-4 left-4 right-4 h-[200px] bg-[#FAF8F5] rounded-t-md shadow-md border-t-2 border-x border-yellow-600/10 overflow-hidden z-10 transform translate-y-2 transition-transform duration-1000">
                <img src="1000015399.jpg" alt="Peek" class="w-full h-full object-cover object-top opacity-95 absolute inset-0 z-0" onerror="this.style.display='none'">
                <div class="absolute inset-0 flex flex-col items-center justify-center p-4 bg-[#FAF8F5]/85 text-center z-10">
                    <p class="font-cursive-cyrillic text-2xl text-yellow-700/85">Милош, Јована<br>и Душан</p>
                    <div class="h-[1px] w-12 bg-yellow-600/20 my-2"></div>
                    <p class="text-[9px] tracking-widest text-stone-500 uppercase">Позивница за венчање и крштење</p>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 h-[150px] z-20 overflow-hidden pointer-events-none">
                <svg viewBox="0 0 460 150" class="w-full h-full drop-shadow-[0_-5px_10px_rgba(0,0,0,0.08)]">
                    <polygon points="0,150 0,0 230,105" fill="#a4b4a1" stroke="#889885" stroke-width="0.5"/>
                    <polygon points="460,150 460,0 230,105" fill="#9db09a" stroke="#889885" stroke-width="0.5"/>
                    <polygon points="0,150 460,150 230,95" fill="#92a58f" stroke="#7e917b" stroke-width="0.5"/>
                </svg>
            </div>

            <div id="envelope-flap" class="envelope-flap absolute top-0 left-0 right-0 h-[150px] pointer-events-auto">
                <svg viewBox="0 0 460 150" class="w-full h-full drop-shadow-[0_4px_8px_rgba(0,0,0,0.15)]">
                    <polygon points="0,0 460,0 230,150" fill="#8d9e8a" stroke="#FAF8F5" stroke-width="1" stroke-opacity="0.2"/>
                    <polygon points="12,4 448,4 230,138" fill="#9db09a" opacity="0.9"/>
                </svg>
            </div>

            <div id="wax-seal" class="absolute left-1/2 top-[125px] -translate-x-1/2 -translate-y-1/2 z-30 transition-all duration-700 cursor-pointer">
                <div class="seal-pulse w-14 h-14 bg-gradient-to-br from-yellow-500 via-amber-600 to-amber-800 rounded-full flex items-center justify-center shadow-lg transform hover:scale-105 active:scale-95 duration-200">
                    <div class="w-11 h-11 border border-yellow-300/40 rounded-full flex items-center justify-center p-1 bg-gradient-to-tr from-amber-600 to-yellow-500 shadow-inner">
                        <span class="font-serif text-white text-base font-bold shadow-sm">
                            <i class="fa-solid fa-feather-pointed"></i>
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-12 text-center text-white/60 pointer-events-none">
            <p class="font-cursive-cyrillic text-xl">Милош, Јована и Душан</p>
            <p class="text-[9px] tracking-widest uppercase mt-1">9. АВГУСТ 2026. • БЕОГРАД</p>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- SECTION 2: THE MAIN INVITATION IMAGE CARD   -->
    <!-- ============================================ -->
    <main id="invitation-main" class="relative z-20 w-full max-w-lg px-4 flex flex-col items-center justify-center opacity-0 hidden">
        <div class="w-full flex flex-col items-center justify-center">
            
            <!-- Beautiful physical frame containing your uploaded JPG with unrolling carpet effect -->
            <div id="carpet-roll-container" class="carpet-roll relative bg-[#FAF8F5] shadow-2xl rounded-sm p-1.5 border border-[#e5dec9] overflow-hidden flex items-center justify-center">
                <img id="invitation-image" src="1000015399.jpg" alt="Позивница" class="max-h-[82vh] md:max-h-[85vh] w-auto h-auto max-w-full object-contain rounded-sm" onerror="handleImageError(this)">
                
                <!-- Shimmer highlight effect mimicking paper curve reflection while unrolling -->
                <div id="unroll-shine" class="absolute inset-0 bg-gradient-to-b from-white/0 via-white/20 to-black/10 pointer-events-none mix-blend-overlay transition-transform duration-[1.8s] ease-out" style="transform: translateY(-100%);"></div>
            </div>
            
        </div>
    </main>

    <!-- Music Banner Offer -->
    <div id="audio-consent" class="fixed bottom-6 left-6 z-50 max-w-xs bg-white/95 backdrop-blur-sm p-4 rounded-xl shadow-xl border border-yellow-600/10 transition-all duration-500 transform translate-y-10 opacity-0 pointer-events-none">
        <p class="text-xs text-stone-700 mb-2">Желите ли да слушате амбијенталну мелодију док прегледате позивницу?</p>
        <div class="flex space-x-2 justify-end">
            <button onclick="declineMusic()" class="px-3 py-1 text-xs border border-stone-200 rounded-md text-stone-500 hover:bg-stone-50">Не</button>
            <button onclick="approveMusic()" class="px-3 py-1 text-xs bg-[#a2b29f] hover:bg-[#889885] text-white rounded-md">Да</button>
        </div>
    </div>

    <script>
        // High Performance Particle Background with mobile density check
        const canvas = document.getElementById('gold-dust-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        // Auto-optimize particle density for smaller devices to prevent lags
        const maxParticles = window.innerWidth < 768 ? 14 : 30;
        let isTransitioning = false; // Flag to pause painting during the 3D paper animation

        function resizeCanvas() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() { this.reset(); }
            reset() { 
                this.x = Math.random() * canvas.width; 
                this.y = Math.random() * canvas.height; 
                this.size = Math.random() * 1.5 + 0.5; 
                this.speedX = Math.random() * 0.15 - 0.07; 
                this.speedY = Math.random() * 0.25 + 0.05; 
                this.alpha = Math.random() * 0.4 + 0.1; 
                this.alphaSpeed = Math.random() * 0.005 + 0.001; 
            }
            update() { 
                this.x += this.speedX; 
                this.y += this.speedY; 
                this.alpha += this.alphaSpeed; 
                if (this.alpha > 0.6 || this.alpha < 0.1) this.alphaSpeed = -this.alphaSpeed; 
                if (this.y > canvas.height) { this.reset(); this.y = 0; } 
            }
            draw() { 
                ctx.save(); 
                ctx.globalAlpha = this.alpha; 
                ctx.fillStyle = '#d4af37'; 
                ctx.beginPath(); 
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); 
                ctx.fill(); 
                ctx.restore(); 
            }
        }
        for (let i = 0; i < maxParticles; i++) particles.push(new Particle());
        
        function animate() { 
            // Bypass canvas draws during the 3D unrolling phase to prioritize silky-smooth CPU/GPU frames
            if (!isTransitioning) {
                ctx.clearRect(0, 0, canvas.width, canvas.height); 
                particles.forEach(p => { p.update(); p.draw(); }); 
            }
            requestAnimationFrame(animate); 
        }
        animate();

        const seal = document.getElementById('wax-seal');
        const flap = document.getElementById('envelope-flap');
        const peek = document.getElementById('envelope-card-peek');
        const envelopeScreen = document.getElementById('envelope-screen');
        const mainInvite = document.getElementById('invitation-main');
        const carpetContainer = document.getElementById('carpet-roll-container');
        const unrollShine = document.getElementById('unroll-shine');

        seal.addEventListener('click', () => {
            playOpeningChime();
            isTransitioning = true; // Turn off particles temporarily
            seal.classList.add('opacity-0', 'pointer-events-none');
            
            setTimeout(() => { flap.classList.add('open'); }, 300);
            setTimeout(() => { peek.style.transform = "translateY(-150px) scale(1.05)"; peek.style.opacity = "0"; }, 800);
            
            setTimeout(() => {
                envelopeScreen.classList.add('transition-all', 'duration-1000', 'opacity-0', 'pointer-events-none');
                mainInvite.classList.remove('hidden');
                
                setTimeout(() => { 
                    mainInvite.classList.remove('opacity-0'); 
                    // Activate the gorgeous carpet unroll and light shine sweeping down
                    carpetContainer.classList.add('unrolled');
                    unrollShine.style.transform = "translateY(100%)";
                    showMusicOffer(); 
                }, 50);

                // Resume ambient particle dust gracefully after unrolling completes
                setTimeout(() => {
                    isTransitioning = false;
                }, 1800);

            }, 1800);
        });

        let audioCtx = null; let isMusicPlaying = false; let melodyTimer = null;
        function playOpeningChime() {
            try {
                const actx = new (window.AudioContext || window.webkitAudioContext)();
                const chimeFreqs = [523.25, 659.25, 783.99, 987.77, 1046.50];
                chimeFreqs.forEach((freq, i) => {
                    const osc = actx.createOscillator(); const gain = actx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(freq, actx.currentTime + (i * 0.1)); gain.gain.setValueAtTime(0, actx.currentTime + (i * 0.1)); gain.gain.linearRampToValueAtTime(0.06, actx.currentTime + (i * 0.1) + 0.05); gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + (i * 0.1) + 0.8); osc.connect(gain); gain.connect(actx.destination); osc.start(actx.currentTime + (i * 0.1)); osc.stop(actx.currentTime + (i * 0.1) + 0.9);
                });
            } catch(e) {}
        }
        function showMusicOffer() { const consent = document.getElementById('audio-consent'); consent.classList.remove('opacity-0', 'pointer-events-none'); consent.classList.add('opacity-100', 'pointer-events-auto', 'translate-y-0'); }
        function declineMusic() { dismissMusicConsent(); document.getElementById('music-toggle-btn').classList.remove('hidden'); }
        function approveMusic() { dismissMusicConsent(); startMusicSynth(); }
        function dismissMusicConsent() { const consent = document.getElementById('audio-consent'); consent.classList.remove('opacity-100', 'translate-y-0'); consent.classList.add('opacity-0', 'pointer-events-none', 'translate-y-10'); }
        const toggleBtn = document.getElementById('music-toggle-btn');
        toggleBtn.addEventListener('click', () => { if (isMusicPlaying) { stopMusicSynth(); } else { startMusicSynth(); } });
        
        function startMusicSynth() {
            if (isMusicPlaying) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)(); isMusicPlaying = true; toggleBtn.classList.remove('hidden'); document.getElementById('music-wave').classList.remove('hidden'); document.getElementById('music-icon').classList.add('text-yellow-600');
                const chords = [[261.63, 329.63, 392.00, 493.88], [293.66, 349.23, 440.00, 523.25], [220.00, 261.63, 329.63, 392.00], [196.00, 246.94, 293.66, 392.00]]; let chordIndex = 0;
                function playMelody() {
                    if (!isMusicPlaying || !audioCtx) return; const now = audioCtx.currentTime; const chord = chords[chordIndex];
                    chord.forEach((freq, noteIdx) => {
                        const noteDelay = noteIdx * 0.25; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); const lowpass = audioCtx.createBiquadFilter(); osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, now + noteDelay); lowpass.type = 'lowpass'; lowpass.frequency.setValueAtTime(800, now + noteDelay); gain.gain.setValueAtTime(0, now + noteDelay); gain.gain.linearRampToValueAtTime(0.04, now + noteDelay + 0.3); gain.gain.exponentialRampToValueAtTime(0.001, now + noteDelay + 2.5); osc.connect(lowpass); lowpass.connect(gain); gain.connect(audioCtx.destination); osc.start(now + noteDelay); osc.stop(now + noteDelay + 3.0);
                    });
                    chordIndex = (chordIndex + 1) % chords.length;
                }
                playMelody(); melodyTimer = setInterval(playMelody, 4000);
            } catch(e) {}
        }
        function stopMusicSynth() { isMusicPlaying = false; if (melodyTimer) clearInterval(melodyTimer); if (audioCtx) { audioCtx.close(); audioCtx = null; } document.getElementById('music-wave').classList.add('hidden'); document.getElementById('music-icon').classList.remove('text-yellow-600'); }

        function handleImageError(img) { 
            img.parentElement.innerHTML = `
                <div class="p-8 text-center text-stone-500 font-serif max-w-sm">
                    <p class="font-cursive-cyrillic text-3xl text-yellow-700/80 mb-4">Милош, Јована и Душан</p>
                    <p class="text-sm">Нисмо успели да учитамо слику '1000015399.jpg'. Молимо вас проверите да ли се налази у истом фолдеру са позивницом.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
